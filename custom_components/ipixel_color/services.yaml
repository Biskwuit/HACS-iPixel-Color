ipixel_color.send_text:
  description: Send a text message to the LED matrix display.
  fields:
    entity_id:
      description: Entity ID of the iPixel LED matrix.
      example: light.ipixel_color_led_matrix
      required: true
      selector:
        entity:
          integration: ipixel_color
    message:
      description: Text message to display.
      example: Hello World!
      required: true
      selector:
        text:
    color:
      description: Text color in hex (e.g. "ff0000" for red).
      example: "ffffff"
      default: "ffffff"
      selector:
        text:
    bg_color:
      description: Background color in hex (omit for no background).
      example: "000000"
      required: false
      selector:
        text:
    animation:
      description: Animation type (0-7, except 3 and 4).
      example: "0"
      default: "0"
      selector:
        number:
          min: 0
          max: 7
          mode: box
    speed:
      description: Animation speed (0-100).
      example: "80"
      default: "80"
      selector:
        number:
          min: 0
          max: 100
          mode: box
    rainbow_mode:
      description: Rainbow mode (0-9; 0 = off).
      example: "0"
      default: "0"
      selector:
        number:
          min: 0
          max: 9
          mode: box
    font:
      description: Font name. Built-in fonts are "CUSONG", "SIMSUN", "VCR_OSD_MONO".
      example: CUSONG
      default: CUSONG
      selector:
        text:
    brightness:
      description: Temporary brightness override for this message (0-100).
      required: false
      selector:
        number:
          min: 0
          max: 100
          mode: box

ipixel_color.send_image:
  description: Send an image file to the LED matrix.
  fields:
    entity_id:
      description: Entity ID of the iPixel LED matrix.
      example: light.ipixel_color_led_matrix
      required: true
      selector:
        entity:
          integration: ipixel_color
    path:
      description: Full path to an image file on the Home Assistant host. Supported formats: PNG, WebP, JPG, BMP, TIFF, GIF, HEIC.
      example: "/config/www/hello.png"
      required: true
      selector:
        text:
    resize_method:
      description: "Resize method: 'crop' fills the display and crops excess, 'fit' fits the whole image with black padding."
      example: crop
      default: crop
      selector:
        select:
          options:
            - crop
            - fit
